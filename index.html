<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Essential 80s Metal Playlist</title>

<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  scroll-behavior:smooth;
}

body {
  font-family:'Inter', sans-serif;
  background:#0d0d0d;
  color:white;
  overflow-x:hidden;
}

/* LOGIN */
#authOverlay {
  position:fixed;
  inset:0;
  background:radial-gradient(circle, #111, #000);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999999;
}

.auth-box {
  width:420px;
  padding:40px;
  border-radius:20px;
  background:rgba(15,15,15,0.95);
  border:1px solid rgba(255,255,255,0.08);
  text-align:center;
}

.auth-box h1 {
  font-size:2rem;
  margin-bottom:10px;
}

.auth-box input {
  width:100%;
  padding:14px;
  margin:10px 0;
  border-radius:12px;
  border:none;
  background:#1b1b1b;
  color:white;
  outline:none;
}

.auth-box button {
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#ff4d6d,#ff758f);
  color:white;
  cursor:pointer;
  font-weight:600;
}

/* SITE */
#siteContent {
  display:none;
}

/* NAV */
nav {
  position:fixed;
  top:0;
  width:100%;
  padding:18px;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(10px);
  display:flex;
  justify-content:center;
  gap:20px;
  z-index:999;
}

nav a {
  color:white;
  text-decoration:none;
  font-size:0.9rem;
}

/* SECTIONS */
section {
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:60px;
  position:relative;
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}

section::before {
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.65);
}

.content {
  position:relative;
  z-index:2;
  max-width:900px;
  background:rgba(20,20,20,0.75);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:24px;
  padding:50px;
}

.audio-btn {
  margin-top:20px;
  padding:14px 24px;
  border:none;
  border-radius:50px;
  background:linear-gradient(135deg,#ff4d6d,#ff758f);
  color:white;
  cursor:pointer;
  font-weight:600;
}

footer {
  background:#000;
  padding:40px;
  text-align:center;
  color:#888;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="authOverlay">
  <div class="auth-box">
    <h1>Member Access</h1>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>
  </div>
</div>

<!-- SITE -->
<div id="siteContent">

<nav>
  <a href="#home">Home</a>
  <a href="#motley">Mötley Crüe</a>
  <a href="#metallica">Metallica</a>
  <a href="#poison">Poison</a>
  <a href="#ozzy">Ozzy</a>
</nav>

<section id="home" style="background-image:url('images/home.jpg')">
  <div class="content">
    <h1>Essential 80s Metal Playlist</h1>
    <button class="audio-btn" onclick="playSong('audio/nightsongs.mp3')">Play</button>
  </div>
</section>

<section id="motley" style="background-image:url('images/motley.jpg')">
  <div class="content">
    <h2>Mötley Crüe</h2>
    <button class="audio-btn" onclick="playSong('audio/merrygoround.mp3')">Play</button>
  </div>
</section>

<section id="metallica" style="background-image:url('images/metallica.jpg')">
  <div class="content">
    <h2>Metallica</h2>
    <button class="audio-btn" onclick="playSong('audio/seekdestroy.mp3')">Play</button>
  </div>
</section>

<section id="poison" style="background-image:url('images/poison.jpg')">
  <div class="content">
    <h2>Poison</h2>
    <button class="audio-btn" onclick="playSong('audio/crytough.mp3')">Play</button>
  </div>
</section>

<section id="ozzy" style="background-image:url('images/ozzy.jpg')">
  <div class="content">
    <h2>Ozzy Osbourne</h2>
    <button class="audio-btn" onclick="playSong('audio/shotinthedark.mp3')">Play</button>
  </div>
</section>

<footer>
  © 2026 Essential 80s Metal Playlist
</footer>

</div>

<script>
/* USERS */
const USERS = {
  "admin": "root",
  "kaiden": "tinka",
  "mcneill": "culminating",
  "tommylee": "motleycru3"
};

/* LOGIN */
function login() {
  const u = document.getElementById("username").value.trim().toLowerCase();
  const p = document.getElementById("password").value;

  if (USERS[u] && USERS[u] === p) {
    sessionStorage.setItem("auth", u);
    showSite();
  } else {
    location.reload();
  }
}

function showSite() {
  document.getElementById("authOverlay").style.display = "none";
  document.getElementById("siteContent").style.display = "block";
}

/* session check (NO infinite reload loop fix) */
function checkAuth() {
  const u = sessionStorage.getItem("auth");

  if (USERS[u]) {
    showSite();
  }
}

/* AUDIO */
let current = null;

function playSong(src) {
  if (current) {
    current.pause();
  }

  current = new Audio(src);
  current.volume = 0.5;
  current.play();
}

/* basic protection */
document.addEventListener("contextmenu", e => e.preventDefault());

document.addEventListener("keydown", e => {
  if (
    e.key === "F12" ||
    (e.ctrlKey && e.shiftKey && ["I","J","C"].includes(e.key)) ||
    (e.ctrlKey && e.key === "u")
  ) {
    e.preventDefault();
  }
});

checkAuth();
</script>

</body>
</html>
