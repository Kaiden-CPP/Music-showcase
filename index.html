<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Essential 80s Metal Playlist</title>

<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; scroll-behavior:smooth; }

body {
  font-family:'Inter', sans-serif;
  background:#0d0d0d;
  color:white;
  overflow-x:hidden;
  user-select:none;
}

nav {
  position:fixed;
  top:0;
  width:100%;
  padding:18px;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(10px);
  display:flex;
  justify-content:center;
  gap:20px;
  z-index:999;
}

nav a { color:white; text-decoration:none; }

#lockscreen {
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:999999;
}

#lockscreen input {
  padding:14px;
  width:260px;
  margin:10px;
  border-radius:10px;
  border:none;
}

#lockscreen button {
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#ff4d6d,#ff758f);
  color:white;
  cursor:pointer;
}

#app {
  display:none;
}

section {
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:60px;
  position:relative;
  background-size:cover;
  background-position:center;
}

section::before {
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.65);
}

.content {
  position:relative;
  z-index:2;
  max-width:900px;
  background:rgba(20,20,20,0.75);
  padding:50px;
  border-radius:24px;
}

.audio-btn {
  margin-top:20px;
  padding:14px 24px;
  border:none;
  border-radius:40px;
  background:linear-gradient(135deg,#ff4d6d,#ff758f);
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- LOCK SCREEN -->
<div id="lockscreen">
  <h2>Vault Locked</h2>
  <input type="password" id="password" placeholder="Enter Password">
  <button onclick="unlock()">Unlock</button>
</div>

<!-- APP -->
<div id="app">

<nav>
  <a href="#home">Home</a>
  <a href="#motley">Mötley Crüe</a>
  <a href="#metallica">Metallica</a>
  <a href="#poison">Poison</a>
  <a href="#ozzy">Ozzy</a>
</nav>

<div id="content"></div>

</div>

<script>
/* =========================
   ENCRYPTED VAULT DATA
   =========================

*/
const ENCRYPTED_PAYLOAD = "vTAuMm5mmdtuvJMGFsZiVzMVBHuh1ppV8wBxeeQBSXpUUk9lRbEpavMyzFnseCH/1ZGWv7rkH9Fwm8zcxR5iTFAn95z/1wCwvf/T/Fs3/DJgl0cqrEPGhHf2CbhH3Lke8ZRf68fYHwSjFqTdQImLvTx6oPFn5I16dnZwcpmvjq6uzXWGVkS9oaEnG6rMLj2QvVf8OwAqM0qb9z+hCV62sFRa2mFY8B1kb1jlgUStd0zAgsdxcxvd5gcllnoCbKK6krWF7V1hekNtnU2vrAwiIJUC3BhjqCaleXJa7mzYVrXLjkZauOjtOfb8V0nCBYabbb0bS18001M1NnpzkGEhYwa5ktRugTAd+hF4yIgzwfBmMzNHS943RJ9OeeDShRi1UetOAejLT3D+jBaif6R1TPbLkNqf0fq/NigMX03d0X+PFbkawoBT5jQylX6n/rdYkY4nNoqaAzEMEL0SkweswISBHhDewiwbVut322qj VM35:14";

/* =========================
   CRYPTO ENGINE
   ========================= */

function b64ToBytes(b64) {
  return Uint8Array.from(atob(b64), c => c.charCodeAt(0));
}

async function deriveKey(password, salt) {
  const enc = new TextEncoder();

  const keyMaterial = await crypto.subtle.importKey(
    "raw",
    enc.encode(password),
    "PBKDF2",
    false,
    ["deriveKey"]
  );

  return crypto.subtle.deriveKey(
    {
      name: "PBKDF2",
      salt,
      iterations: 100000,
      hash: "SHA-256"
    },
    keyMaterial,
    { name: "AES-GCM", length: 256 },
    false,
    ["decrypt"]
  );
}

async function decryptVault(password) {
  const raw = b64ToBytes(ENCRYPTED_PAYLOAD);

  const salt = raw.slice(0,16);
  const iv = raw.slice(16,28);
  const data = raw.slice(28);

  const key = await deriveKey(password, salt);

  const decrypted = await crypto.subtle.decrypt(
    { name:"AES-GCM", iv },
    key,
    data
  );

  return JSON.parse(new TextDecoder().decode(decrypted));
}

/* =========================
   UI
   ========================= */

async function unlock() {
  const pass = document.getElementById("password").value;

  try {
    const data = await decryptVault(pass);

    sessionStorage.setItem("unlocked","1");

    document.getElementById("lockscreen").style.display = "none";
    document.getElementById("app").style.display = "block";

    render(data);

  } catch (e) {
    alert("Wrong password");
  }
}

function render(data) {
  const container = document.getElementById("content");

  let html = "";

  for (const s of data.sections) {
    html += `
      <section id="${s.id}" style="background-image:url('${s.bg}')">
        <div class="content">
          <h2>${s.title}</h2>
          <p>${s.desc}</p>
          <button class="audio-btn" onclick="playSong('${s.audio}')">
            ♫ Play
          </button>
        </div>
      </section>
    `;
  }

  container.innerHTML = html;
}

/* audio */
let current = null;
function playSong(src) {
  if (current) {
    current.pause();
  }
  current = new Audio(src);
  current.volume = 0.5;
  current.play();
}

/* session restore */
if (sessionStorage.getItem("unlocked") === "1") {
  document.getElementById("lockscreen").style.display = "none";
  document.getElementById("app").style.display = "block";
}
</script>

</body>
</html>
